<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Southland Equity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --green: #2A5247;
      --green-mid: #3B7D71;
      --accent: #8BC47A;
      --bg-light: #F4F5EF;
      --bg-warm: #EEEFE8;
      --text-body: #2C2C2C;
      --text-muted: #7A7A72;
      --border: #E0E1DA;
      --font-display: 'Libre Baskerville', Georgia, serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-body: 'Inter', sans-serif;
      --page-max: 1440px;
      --gutter: clamp(40px, 5.5vw, 120px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg-light); color: var(--text-body); }

    /* NAV */
    nav { background: var(--green); position: sticky; top: 0; z-index: 50; }
    .nav-inner { max-width: var(--page-max); margin: 0 auto; padding-left: var(--gutter); padding-right: var(--gutter); height: 72px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: var(--font-display); font-size: 24px; color: #fff; text-decoration: none; font-weight: 400; letter-spacing: 0.01em; }
    .nav-menu { display: flex; align-items: center; gap: 4px; }
    .nav-link { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.75); text-decoration: none; padding: 8px 14px; border-radius: 3px; transition: color 0.15s; }
    .nav-link:hover { color: #fff; }
    .nav-cta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; background: var(--accent); color: var(--green); padding: 11px 22px; border-radius: 3px; text-decoration: none; font-weight: 700; margin-left: 16px; transition: opacity 0.15s; }
    .nav-cta:hover { opacity: 0.88; }

    /* POST */
    .post-wrap { max-width: 1000px; margin: 0 auto; padding: 80px var(--gutter); }
    .post-back { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--green-mid); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 48px; transition: color 0.15s; }
    .post-back:hover { color: var(--green); }
    .post-tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); background: rgba(59,125,113,0.1); border: 0.5px solid rgba(59,125,113,0.22); border-radius: 3px; padding: 5px 11px; display: inline-block; margin-bottom: 20px; }
    .post-title { font-family: var(--font-display); font-size: 44px; line-height: 1.15; color: var(--green); font-weight: 400; margin-bottom: 20px; }
    .post-date { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 48px; }
    .post-image { width: 100%; height: 480px; object-fit: cover; border-radius: 4px; margin-bottom: 48px; display: block; }
    .post-body { font-size: 17px; line-height: 1.85; color: var(--text-body); font-weight: 300; }
    .post-body h1, .post-body h2, .post-body h3 { font-family: var(--font-display); color: var(--green); font-weight: 400; margin: 40px 0 16px; line-height: 1.2; }
    .post-body h2 { font-size: 28px; }
    .post-body h3 { font-size: 22px; }
    .post-body p { margin-bottom: 24px; }
    .post-body ul, .post-body ol { margin: 0 0 24px 24px; }
    .post-body li { margin-bottom: 8px; }
    .post-body strong { font-weight: 500; color: var(--green); }
    .post-body a { color: var(--green-mid); text-decoration: underline; }
    .post-loading { text-align: center; padding: 120px 0; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }

    /* FOOTER */
    footer { background: var(--green); padding: 64px 0 32px; margin-top: 80px; }
    .footer-inner { max-width: var(--page-max); margin: 0 auto; padding-left: var(--gutter); padding-right: var(--gutter); }
    .footer-bottom { border-top: 0.5px solid rgba(255,255,255,0.15); margin-top: 48px; padding-top: 24px; display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35); }

    @media (max-width: 767px) {
      .nav-menu { display: none; }
      .post-wrap { padding: 48px 20px; }
      .post-title { font-size: 28px; }
      .post-image { height: 240px; }
      .post-body { font-size: 15px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Southland Equity</a>
    <div class="nav-menu">
      <div style="position:relative;">
        <a href="about.html" class="nav-link">About Us</a>
      </div>
      <div style="position:relative;">
        <a href="owners.html" class="nav-link">For Owners</a>
      </div>
      <a href="blog.html" class="nav-link active">Blog</a>
      <a href="connect.html" class="nav-link">Connect</a>
      <a href="connect.html" class="nav-cta">Start a Conversation</a>
    </div>
  </div>
</nav>

<div class="post-wrap">
  <div id="postContent">
    <div class="post-loading">Loading post...</div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-bottom">
      <div class="footer-copy">&copy; 2025 Southland Equity. All rights reserved.</div>
      <div class="footer-copy"><a href="privacy-policy.html" style="color:rgba(255,255,255,0.35);text-decoration:none;">Privacy Policy</a> &nbsp;&middot;&nbsp; <a href="terms.html" style="color:rgba(255,255,255,0.35);text-decoration:none;">Terms</a></div>
    </div>
  </div>
</footer>

<script>
(function(){
  var REPO = 'SouthlandEquity/Southlandequity_site';
  var BRANCH = 'main';
  var RAW = 'https://raw.githubusercontent.com/' + REPO + '/' + BRANCH + '/_posts/';

  function parseFrontmatter(text) {
    var fm = {};
    var match = text.match(/^---\n([\s\S]*?)\n---/);
    if (!match) return { meta: fm, body: text };
    var lines = match[1].split('\n');
    lines.forEach(function(line) {
      var kv = line.match(/^(\w+):\s*(.+)$/);
      if (kv) fm[kv[1].trim()] = kv[2].trim().replace(/^["']|["']$/g,'');
    });
    return { meta: fm, body: text.slice(match[0].length).trim() };
  }

  function formatDate(str) {
    if (!str) return '';
    var d = new Date(str);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  var params = new URLSearchParams(window.location.search);
  var slug = params.get('slug');

  if (!slug) {
    document.getElementById('postContent').innerHTML = '<div class="post-loading">Post not found.</div>';
    return;
  }

  fetch(RAW + slug + '.md')
    .then(function(r){
      if (!r.ok) throw new Error('Not found');
      return r.text();
    })
    .then(function(text){
      var parsed = parseFrontmatter(text);
      var m = parsed.meta;
      var bodyHtml = marked.parse(parsed.body);
      var imgHtml = m.image ? '<img class="post-image" src="' + m.image + '" alt="' + (m.title||'') + '">' : '';
      document.title = (m.title || 'Blog Post') + ' | Southland Equity';
      document.getElementById('postContent').innerHTML =
        '<a href="blog.html" class="post-back"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> Back to Blog</a>'
        + (m.category ? '<div class="post-tag">' + m.category + '</div>' : '')
        + '<h1 class="post-title">' + (m.title||'') + '</h1>'
        + '<div class="post-date">' + formatDate(m.date) + '</div>'
        + imgHtml
        + '<div class="post-body">' + bodyHtml + '</div>';
    })
    .catch(function(){
      document.getElementById('postContent').innerHTML = '<div class="post-loading">Post not found. <a href="blog.html" style="color:var(--green-mid);">Back to blog</a></div>';
    });
})();
</script>

</body>
</html>
